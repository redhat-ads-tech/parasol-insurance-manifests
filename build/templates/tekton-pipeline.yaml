apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: parasol-insurance-tag-promote
  namespace: {{ .Values.namespace }}
spec:
  params:
    - name: git-tag
      type: string
    - name: git-revision
      type: string
  workspaces:
    - name: source
    - name: basic-auth
    - name: dockerconfig
    - name: maven-cache
  tasks:
    - name: clone-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: "https://{{ .Values.gitlab.host }}/parasol/parasol-insurance.git"
        - name: REVISION
          value: $(params.git-revision)
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: basic-auth
    - name: build-tagged-image
      runAfter:
        - clone-source
      taskRef:
        name: shipwright-build
      params:
        - name: BUILD_NAME
          value: parasol-insurance
        - name: IMAGE_TAG
          value: $(params.git-tag)
    - name: open-prod-pr
      runAfter:
        - build-tagged-image
      taskRef:
        name: update-prod-manifest
      params:
        - name: IMAGE_TAG
          value: $(params.git-tag)
      workspaces:
        - name: source
          workspace: source
