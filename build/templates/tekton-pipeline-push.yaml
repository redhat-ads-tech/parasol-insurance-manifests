apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: parasol-insurance-push
  namespace: {{ .Values.namespace }}
spec:
  params:
    - name: git-revision
      type: string
  workspaces:
    - name: source
    - name: basic-auth
    - name: dockerconfig
    - name: sonar-credentials
    - name: maven-cache
  tasks:
    - name: clone-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: "https://{{ .Values.gitlab.host }}/parasol/parasol-insurance.git"
        - name: REVISION
          value: $(params.git-revision)
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: basic-auth
    - name: sonar-scan
      runAfter:
        - clone-source
      taskRef:
        name: sonar-scan
      params:
        - name: SONAR_HOST_URL
          value: "{{ .Values.sonarqube.host }}"
        - name: SONAR_DASHBOARD_URL
          value: "{{ .Values.sonarqube.dashboardUrl }}"
        - name: SONAR_PROJECT_KEY
          value: parasol-insurance
      workspaces:
        - name: source
          workspace: source
        - name: sonar-credentials
          workspace: sonar-credentials
        - name: maven-cache
          workspace: maven-cache
    - name: build-and-push
      runAfter:
        - sonar-scan
      taskRef:
        name: shipwright-build
      params:
        - name: BUILD_NAME
          value: parasol-insurance
        - name: IMAGE_TAG
          value: latest
    - name: rollout-restart
      runAfter:
        - build-and-push
      taskRef:
        name: rollout-restart
      params:
        - name: DEPLOYMENT
          value: parasol-insurance
        - name: NAMESPACE
          value: parasol-insurance-dev
