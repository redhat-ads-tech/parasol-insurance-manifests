apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: parasol-insurance-tag-listener
  namespace: {{ .Values.namespace }}
spec:
  serviceAccountName: parasol-insurance-build
  triggers:
    - name: push
      interceptors:
        - ref:
            name: gitlab
            kind: ClusterInterceptor
          params:
            - name: secretRef
              value:
                secretName: gitlab-webhook-secret
                secretKey: token
            - name: eventTypes
              value:
                - "Push Hook"
      bindings:
        - ref: parasol-insurance-push-binding
      template:
        ref: parasol-insurance-push-template
    - name: tag-push
      interceptors:
        - ref:
            name: gitlab
            kind: ClusterInterceptor
          params:
            - name: secretRef
              value:
                secretName: gitlab-webhook-secret
                secretKey: token
            - name: eventTypes
              value:
                - "Tag Push Hook"
        - ref:
            name: cel
            kind: ClusterInterceptor
          params:
            - name: overlays
              value:
                - key: tag_name
                  expression: "body.ref.split('/').last()"
      bindings:
        - ref: parasol-insurance-tag-binding
      template:
        ref: parasol-insurance-tag-template
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-insurance-tag-listener
  namespace: {{ .Values.namespace }}
spec:
  port:
    targetPort: http-listener
  to:
    kind: Service
    name: el-parasol-insurance-tag-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
